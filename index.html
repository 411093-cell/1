<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字學習卡片</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>英文單字學習卡片</h1>
    <div class="card-container">
        <div class="card" id="card1">
            <div class="front">Hello</div>
            <div class="back">
                <p><strong>音標:</strong> /həˈloʊ/</p>
                <p><strong>例句:</strong> Hello, how are you?</p>
                <p><strong>字詞分析:</strong> 問候語，用於打招呼。</p>
            </div>
        </div>
        <div class="card" id="card2">
            <div class="front">World</div>
            <div class="back">
                <p><strong>音標:</strong> /wɜːrld/</p>
                <p><strong>例句:</strong> The world is beautiful.</p>
                <p><strong>字詞分析:</strong> 世界，指地球或人類社會。</p>
            </div>
        </div>
        <div class="card" id="card3">
            <div class="front">Computer</div>
            <div class="back">
                <p><strong>音標:</strong> /kəmˈpjuːtər/</p>
                <p><strong>例句:</strong> I use a computer every day.</p>
                <p><strong>字詞分析:</strong> 計算機，用於處理數據的電子設備。</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
